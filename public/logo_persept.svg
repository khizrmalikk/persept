  <defs>
    <style>
      .cls-1 {
        stroke-width: 4px;
      }

      .cls-1, .cls-2 {
        fill: none;
        stroke: #fff;
        stroke-miterlimit: 10;
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
        animation: draw 6s ease-in-out infinite;
        animation-delay: 1s;
        filter: url(#glow);
      }

      .cls-2 {
        stroke-width: 3px;
        animation-delay: 0.5s;
      }

      @keyframes draw {
        0% {
          stroke-dashoffset: 400;
        }
        40% {
          stroke-dashoffset: 0;
        }
        60% {
          stroke-dashoffset: 0;
        }
        100% {
          stroke-dashoffset: -400;
        }
      }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
